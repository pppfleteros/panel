# Robot del Panel de Fleteros PPP en la nube.
# Corre de lunes a viernes a las 7:08 y a las 14:08, hora argentina,
# y tambien se puede disparar a mano desde Actions -> "Actualizar panel" -> Run workflow.
# (Argentina es UTC-3 y no tiene horario de verano. Los minutos 08 evitan el
#  arranque de la hora en punto, que GitHub suele demorar por congestion.)
name: Actualizar panel

on:
  schedule:
    - cron: "8 10 * * 1-5"   # 7:08 hora argentina, lunes a viernes
    - cron: "8 17 * * 1-5"   # 14:08 hora argentina, lunes a viernes
  workflow_dispatch:

concurrency:
  group: actualizar-panel
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Bajar el repositorio
        uses: actions/checkout@v4

      - name: Poner hora argentina
        shell: powershell
        run: tzutil /s "Argentina Standard Time"

      - name: Correr el robot
        shell: powershell
        env:
          GESCOM_REALM: ${{ secrets.GESCOM_REALM }}
          GESCOM_USUARIO: ${{ secrets.GESCOM_USUARIO }}
          GESCOM_CLAVE: ${{ secrets.GESCOM_CLAVE }}
          CARTON_URL: ${{ secrets.CARTON_URL }}
        run: .\robot-nube.ps1

      - name: Publicar (commit de data.js e historial)
        shell: powershell
        run: |
          git config user.name "robot-ppp"
          git config user.email "robot-ppp@users.noreply.github.com"
          git add data.js historial-meses.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m ("Datos del " + (Get-Date -Format "dd/MM/yyyy HH:mm"))
            git push
            Write-Output "Publicado en GitHub Pages"
          } else {
            Write-Output "Datos sin cambios: no hace falta publicar"
          }
