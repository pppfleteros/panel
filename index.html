<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Fleteros · Primeros Productos Pehuenia S.A.</title>
  <meta name="description" content="Efectividad de entrega y de retorno de cartón de los fleteros de Primeros Productos Pehuenia S.A." />
  <meta name="theme-color" content="#21503B" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2321503B'/%3E%3Ctext x='50' y='66' font-family='Arial' font-size='42' font-weight='bold' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css?v=20260716b" />
  <style>
    /* Foto de fondo del encabezado (se ve al dejar la imagen en assets/img/hero-vans.jpg).
       Si el archivo no existe, se muestra el degradado de marca. */
    .hero::before { --hero-photo: url("assets/img/hero-vans.jpeg"); }
  </style>
</head>
<body>

  <!-- Splash con doble red de seguridad (CSS + JS) -->
  <div id="splash">
    <div style="text-align:center">
      <div class="splash__logo">PPP</div>
      <div class="splash__txt">Cargando panel…</div>
    </div>
  </div>

  <!-- Encabezado / Hero -->
  <header class="hero">
    <div class="hero__bar">
      <img class="brand-logo" src="assets/img/logo.jpeg"
           alt="Logo Primeros Productos Pehuenia"
           onerror="this.classList.add('brand-logo--fallback');this.removeAttribute('src');this.alt='';this.textContent='PPP';" />
      <div class="brand-txt">
        <span class="brand-name">Primeros Productos Pehuenia S.A.</span>
        <span class="brand-sub">Panel de fleteros</span>
      </div>
    </div>
    <div class="hero__title">
      <h1>Tu efectividad, día a día</h1>
      <p>Consultá tu efectividad de entrega y de retorno de cartón. Se actualiza todos los días.</p>
      <span class="hero__update"><span class="dot"></span> Actualizado: <b id="update-date">—</b></span>
    </div>
  </header>

  <!-- Controles -->
  <div class="controls">
    <div class="controls__in">
      <label for="selector">Ver:</label>
      <div class="select-wrap">
        <select id="selector" aria-label="Elegí un fletero o el resumen general">
          <option value="__general__">Resumen general</option>
        </select>
      </div>
      <span class="badge-ejemplo" id="origen" hidden>Datos de ejemplo</span>
    </div>
  </div>

  <!-- Panel dinámico -->
  <main>
    <div id="panel"><p class="muted">Cargando datos…</p></div>
  </main>

  <footer class="foot">
    <b>Primeros Productos Pehuenia S.A.</b> · Panel interno de fleteros
  </footer>

  <!-- Datos primero, lógica después (patrón IIFE, sin módulos ES) -->
  <script defer src="data.js?v=20260716b"></script>
  <script defer src="app.js?v=20260716b"></script>
</body>
</html>
